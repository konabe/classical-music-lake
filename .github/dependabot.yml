version: 2
updates:
  # フロントエンド (Nuxt)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"

  # バックエンド (Lambda)
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"

  # インフラ (CDK)
  - package-ecosystem: "npm"
    directory: "/cdk"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
