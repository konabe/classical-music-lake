name: Security

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # 毎週月曜日 9:00 UTC

jobs:
  audit-frontend:
    name: Security (Frontend)
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # GHSA-v2wj-q39q-566r / GHSA-p9ff-h696-f583: vite dev server fs.deny bypass
        # 影響範囲は @codecov/vite-plugin 経由の dev-only 依存のみで本番ビルド成果物には影響しない。
        # vite 7.3.2 の修正は Nuxt の virtual:public モジュールを誤ブロックするため現状アップグレード不可。
        # Nuxt 側の対応を待つまでの一時的なリスク受容として除外する。
        run: pnpm audit --audit-level=high --ignore GHSA-v2wj-q39q-566r --ignore GHSA-p9ff-h696-f583

  audit-backend:
    name: Security (Backend)
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # GHSA-v2wj-q39q-566r / GHSA-p9ff-h696-f583: vite dev server fs.deny bypass
        # 影響範囲は @codecov/vite-plugin 経由の dev-only 依存のみで本番ビルド成果物には影響しない。
        # vite 7.3.2 の修正は Nuxt の virtual:public モジュールを誤ブロックするため現状アップグレード不可。
        # Nuxt 側の対応を待つまでの一時的なリスク受容として除外する。
        run: pnpm audit --audit-level=high --ignore GHSA-v2wj-q39q-566r --ignore GHSA-p9ff-h696-f583
        working-directory: backend

  audit-cdk:
    name: Security (CDK)
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        # GHSA-v2wj-q39q-566r / GHSA-p9ff-h696-f583: vite dev server fs.deny bypass
        # 影響範囲は @codecov/vite-plugin 経由の dev-only 依存のみで本番ビルド成果物には影響しない。
        # vite 7.3.2 の修正は Nuxt の virtual:public モジュールを誤ブロックするため現状アップグレード不可。
        # Nuxt 側の対応を待つまでの一時的なリスク受容として除外する。
        run: pnpm audit --audit-level=high --ignore GHSA-v2wj-q39q-566r --ignore GHSA-p9ff-h696-f583
        working-directory: cdk
