name: Security

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # 毎週月曜日 9:00 UTC

permissions:
  contents: read

jobs:
  audit-frontend:
    name: Security (Frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  audit-backend:
    name: Security (Backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: backend

  audit-cdk:
    name: Security (CDK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cdk

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: cdk
