name: Cleanup Unclaimed Listening Logs

# 未帰属視聴ログ（userId が存在しない / null）の削除スクリプトを実行する。
# Issue #297: 認証導入前に作成された未帰属データをクリーンアップする。
#
# トリガー:
#   - push: claude/resolve-issue-297-dfrUk ブランチに対象ファイルが push されたら
#           dev / stg / prod の全環境へ DRY RUN で自動実行（動作確認用）
#   - workflow_dispatch: 任意の環境・dry_run 指定で手動実行

on:
  push:
    branches:
      - claude/resolve-issue-297-dfrUk
    paths:
      - .github/workflows/cleanup-unclaimed-listening-logs.yml
      - backend/scripts/cleanup-unclaimed-listening-logs.mjs
  workflow_dispatch:
    inputs:
      environment:
        description: "対象環境"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      dry_run:
        description: "ドライランで実行するか（false 指定時のみ実削除）"
        required: true
        default: true
        type: boolean

concurrency:
  group: cleanup-unclaimed-listening-logs-${{ github.event.inputs.environment || 'push' }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        stage: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]',
          github.event.inputs.environment)) || fromJSON('["dev","stg","prod"]') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Resolve parameters
        id: params
        run: |
          echo "stage=${{ matrix.stage }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required secrets
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME secret is not set."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cleanup unclaimed listening logs
        env:
          STAGE_NAME: ${{ steps.params.outputs.stage }}
          DRY_RUN: ${{ steps.params.outputs.dry_run }}
        run: node backend/scripts/cleanup-unclaimed-listening-logs.mjs
