name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "stg*"
      - "dev*"
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先の環境"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # ----------------------------------------
      # デプロイ先環境の決定
      # push: mainブランチ → prod、stg*タグ → staging、dev*タグ → dev
      # workflow_dispatch: 入力値をそのまま使用
      # ----------------------------------------
      - name: Determine stage name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${{ github.ref }}" == refs/tags/stg* ]]; then
              echo "STAGE_NAME=staging" >> "$GITHUB_ENV"
            elif [[ "${{ github.ref }}" == refs/tags/dev* ]]; then
              echo "STAGE_NAME=dev" >> "$GITHUB_ENV"
            else
              echo "STAGE_NAME=prod" >> "$GITHUB_ENV"
            fi
          else
            echo "STAGE_NAME=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          fi

      # ----------------------------------------
      # バックエンド依存関係インストール
      # (CDK が esbuild でバンドルする際に node_modules が必要)
      # ----------------------------------------
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      # ----------------------------------------
      # CDK 依存関係インストール & AWS 認証
      # (API URL 取得のためにフロントエンドビルドより前に実行)
      # ----------------------------------------
      - name: Install CDK dependencies
        run: npm install
        working-directory: cdk

      # ----------------------------------------
      # AWS_ROLE_TO_ASSUME シークレットの存在確認
      # 未設定の場合は後続ステップが不明なエラーで落ちるため事前に検出する
      # ----------------------------------------
      - name: Validate required secrets
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME secret is not set. Please configure GitHub OIDC and set the IAM role ARN as AWS_ROLE_TO_ASSUME in repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      # ----------------------------------------
      # スタック名を決定
      # ----------------------------------------
      - name: Resolve stack name
        id: stack
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            echo "name=ClassicalMusicLakeStack" >> "$GITHUB_OUTPUT"
          else
            echo "name=ClassicalMusicLakeStack-${STAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------
      # デプロイ済みスタックから API Base URL を取得
      # CDK Outputs の ApiUrl を GITHUB_OUTPUT に書き出す
      # ----------------------------------------
      - name: Get API Base URL from CloudFormation
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::ApiUrl output not found for stack ${{ steps.stack.outputs.name }}"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # フロントエンド: Nuxt SPA ビルド
      # ----------------------------------------
      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run generate
        env:
          # CloudFormation Outputs から取得した API Gateway URL をセット
          NUXT_PUBLIC_API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}

      - name: Build Storybook
        run: npm run build-storybook

      # ----------------------------------------
      # CDK Bootstrap（bootstrap スタックを最新バージョンに更新）
      # CDKToolkit が参照する ECR リポジトリが削除されていると bootstrap が
      # 失敗するため、事前に存在確認・作成する
      # ----------------------------------------
      - name: Ensure ECR repository for CDK bootstrap
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="cdk-hnb659fds-container-assets-${ACCOUNT}-ap-northeast-1"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" 2>/dev/null \
            || true

      # ----------------------------------------
      # 孤立リソースのクリーンアップ
      # ロールバック時に残ったロググループを削除（存在しない場合は無視）
      # ----------------------------------------
      - name: Cleanup orphaned log groups
        run: |
          aws logs delete-log-group --log-group-name "/aws/apigateway/classical-music-lake-${STAGE_NAME}" 2>/dev/null || true

      - name: CDK Bootstrap
        run: npx cdk bootstrap
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}

      # ----------------------------------------
      # CDK デプロイ
      # (インフラ更新 + ビルド済みフロントエンドを S3 へ反映)
      # ----------------------------------------
      - name: CDK Deploy
        run: npm run deploy
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}
