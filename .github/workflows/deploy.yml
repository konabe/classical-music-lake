name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先の環境"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      STAGE_NAME: ${{ github.event_name == 'push' && 'prod' || github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ----------------------------------------
      # バックエンド依存関係インストール
      # (CDK が esbuild でバンドルする際に node_modules が必要)
      # ----------------------------------------
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      # ----------------------------------------
      # CDK 依存関係インストール & AWS 認証
      # (API URL 取得のためにフロントエンドビルドより前に実行)
      # ----------------------------------------
      - name: Install CDK dependencies
        run: npm install
        working-directory: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # ----------------------------------------
      # スタック名を決定
      # ----------------------------------------
      - name: Resolve stack name
        id: stack
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            echo "name=ClassicalMusicLakeStack" >> "$GITHUB_OUTPUT"
          else
            echo "name=ClassicalMusicLakeStack-${STAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------
      # デプロイ済みスタックから API Base URL を取得
      # CDK Outputs の ApiUrl を GITHUB_OUTPUT に書き出す
      # ----------------------------------------
      - name: Get API Base URL from CloudFormation
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::ApiUrl output not found for stack ${{ steps.stack.outputs.name }}"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # フロントエンド: Nuxt SPA ビルド
      # ----------------------------------------
      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run generate
        env:
          # CloudFormation Outputs から取得した API Gateway URL をセット
          NUXT_PUBLIC_API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}

      # ----------------------------------------
      # CDK Bootstrap（bootstrap スタックを最新バージョンに更新）
      # CDKToolkit が参照する ECR リポジトリが削除されていると bootstrap が
      # 失敗するため、事前に存在確認・作成する
      # ----------------------------------------
      - name: Ensure ECR repository for CDK bootstrap
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="cdk-hnb659fds-container-assets-${ACCOUNT}-ap-northeast-1"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" 2>/dev/null \
            || true

      # ----------------------------------------
      # 孤立リソースのクリーンアップ
      # ロールバック時に残ったロググループを削除（存在しない場合は無視）
      # ----------------------------------------
      - name: Cleanup orphaned log groups
        run: |
          aws logs delete-log-group --log-group-name "/aws/apigateway/classical-music-lake-${STAGE_NAME}" 2>/dev/null || true

      - name: CDK Bootstrap
        run: npx cdk bootstrap
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}

      # ----------------------------------------
      # CDK デプロイ
      # (インフラ更新 + ビルド済みフロントエンドを S3 へ反映)
      # ----------------------------------------
      - name: CDK Deploy
        run: npm run deploy
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}
