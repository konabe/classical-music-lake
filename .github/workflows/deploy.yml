name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "dev*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先の環境"
        required: true
        default: "stg"
        type: choice
        options:
          - dev
          - stg
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "pnpm"

      # ----------------------------------------
      # デプロイ先環境の決定
      # push: mainブランチ → stg、dev*タグ → dev
      # release: published → prod
      # workflow_dispatch: 入力値をそのまま使用
      # ----------------------------------------
      - name: Determine stage name
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "STAGE_NAME=prod" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${{ github.ref }}" == refs/tags/dev* ]]; then
              echo "STAGE_NAME=dev" >> "$GITHUB_ENV"
            else
              echo "STAGE_NAME=stg" >> "$GITHUB_ENV"
            fi
          else
            echo "STAGE_NAME=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          fi

      # ----------------------------------------
      # 全依存関係をインストール
      # ----------------------------------------
      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      # ----------------------------------------
      # AWS_ROLE_TO_ASSUME シークレットの存在確認
      # 未設定の場合は後続ステップが不明なエラーで落ちるため事前に検出する
      # ----------------------------------------
      - name: Validate required secrets
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME secret is not set. Please configure GitHub OIDC and set the IAM role ARN as AWS_ROLE_TO_ASSUME in repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      # ----------------------------------------
      # スタック名を決定
      # ----------------------------------------
      - name: Resolve stack name
        id: stack
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            echo "name=ClassicalMusicLakeStack" >> "$GITHUB_OUTPUT"
          else
            echo "name=ClassicalMusicLakeStack-${STAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------
      # CDK Bootstrap（bootstrap スタックを最新バージョンに更新）
      # CDKToolkit が参照する ECR リポジトリが削除されていると bootstrap が
      # 失敗するため、事前に存在確認・作成する
      # ----------------------------------------
      - name: Ensure ECR repository for CDK bootstrap
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="cdk-hnb659fds-container-assets-${ACCOUNT}-ap-northeast-1"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" 2>/dev/null \
            || true

      # ----------------------------------------
      # 孤立リソースのクリーンアップ
      # ロールバック時に残ったロググループを削除（存在しない場合は無視）
      # ----------------------------------------
      - name: Cleanup orphaned log groups
        run: |
          aws logs delete-log-group --log-group-name "/aws/apigateway/classical-music-lake-${STAGE_NAME}" 2>/dev/null || true

      - name: CDK Bootstrap
        run: npx cdk bootstrap
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}

      # ----------------------------------------
      # CDK デプロイ（インフラのみ）
      # フロントエンドの S3 アップロードはこの後のステップで行う
      # dev/stg: --hotswap-fallback で Lambda 変更時は CloudFormation をバイパスして直接更新（高速化）
      # prod: 安全のためフル CloudFormation デプロイ
      # ----------------------------------------
      - name: CDK Deploy
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            pnpm run deploy
          else
            pnpm run deploy -- --hotswap-fallback
          fi
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # ----------------------------------------
      # CDK デプロイ後にスタック出力を取得
      # CDK デプロイで作成・更新された最新の値を使用するため、
      # フロントエンドビルドの前に取得する
      # ----------------------------------------
      - name: Get stack outputs from CloudFormation
        id: get-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::ApiUrl not found in stack outputs"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

          COGNITO_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CognitoDomainName`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$COGNITO_DOMAIN" ] || [ "$COGNITO_DOMAIN" = "None" ]; then
            echo "::warning::CognitoDomainName not found — building frontend without Cognito domain"
            COGNITO_DOMAIN=""
          fi
          echo "cognito_domain=$COGNITO_DOMAIN" >> "$GITHUB_OUTPUT"

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CognitoClientId`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$COGNITO_CLIENT_ID" ] || [ "$COGNITO_CLIENT_ID" = "None" ]; then
            echo "::warning::CognitoClientId not found — building frontend without Cognito client ID"
            COGNITO_CLIENT_ID=""
          fi
          echo "cognito_client_id=$COGNITO_CLIENT_ID" >> "$GITHUB_OUTPUT"

          SPA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`SpaBucketName`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$SPA_BUCKET" ] || [ "$SPA_BUCKET" = "None" ]; then
            echo "::error::SpaBucketName not found in stack outputs"
            exit 1
          fi
          echo "spa_bucket=$SPA_BUCKET" >> "$GITHUB_OUTPUT"

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "::error::DistributionId not found in stack outputs"
            exit 1
          fi
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # フロントエンド: Nuxt SPA ビルド
      # CDK デプロイ後にスタック出力から取得した最新の値を使用
      # ----------------------------------------
      - name: Build frontend
        run: pnpm run generate
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ steps.get-outputs.outputs.api_url }}
          NUXT_PUBLIC_COGNITO_DOMAIN: ${{ steps.get-outputs.outputs.cognito_domain }}
          NUXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.get-outputs.outputs.cognito_client_id }}

      - name: Build Storybook
        run: pnpm run build-storybook

      # ----------------------------------------
      # フロントエンドを S3 にアップロード
      # SPA と Storybook を個別に同期し、CloudFront キャッシュを無効化
      # ----------------------------------------
      - name: Deploy SPA to S3
        run: |
          aws s3 sync .output/public "s3://${{ steps.get-outputs.outputs.spa_bucket }}" \
            --delete \
            --exclude "storybook/*"

      - name: Deploy Storybook to S3
        run: |
          aws s3 sync storybook-static "s3://${{ steps.get-outputs.outputs.spa_bucket }}/storybook/" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.get-outputs.outputs.distribution_id }}" \
            --paths "/*"
