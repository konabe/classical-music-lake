name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "dev*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先の環境"
        required: true
        default: "stg"
        type: choice
        options:
          - dev
          - stg
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            cdk/package-lock.json

      # ----------------------------------------
      # デプロイ先環境の決定
      # push: mainブランチ → stg、dev*タグ → dev
      # release: published → prod
      # workflow_dispatch: 入力値をそのまま使用
      # ----------------------------------------
      - name: Determine stage name
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "STAGE_NAME=prod" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${{ github.ref }}" == refs/tags/dev* ]]; then
              echo "STAGE_NAME=dev" >> "$GITHUB_ENV"
            else
              echo "STAGE_NAME=stg" >> "$GITHUB_ENV"
            fi
          else
            echo "STAGE_NAME=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          fi

      # ----------------------------------------
      # 全依存関係を並列インストール
      # frontend / backend / CDK を同時に実行して待機することで
      # 直列実行と比較して約 1〜2 分短縮
      # ----------------------------------------
      - name: Install all dependencies
        run: |
          npm ci &
          npm ci --prefix backend &
          npm ci --prefix cdk &
          wait

      # ----------------------------------------
      # AWS_ROLE_TO_ASSUME シークレットの存在確認
      # 未設定の場合は後続ステップが不明なエラーで落ちるため事前に検出する
      # ----------------------------------------
      - name: Validate required secrets
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME secret is not set. Please configure GitHub OIDC and set the IAM role ARN as AWS_ROLE_TO_ASSUME in repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      # ----------------------------------------
      # スタック名を決定
      # ----------------------------------------
      - name: Resolve stack name
        id: stack
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            echo "name=ClassicalMusicLakeStack" >> "$GITHUB_OUTPUT"
          else
            echo "name=ClassicalMusicLakeStack-${STAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------
      # デプロイ済みスタックから API Base URL を取得
      # スタックが未作成（初回デプロイ）の場合は空文字のまま続行し、
      # CDK デプロイでスタックを作成後、次回デプロイ時に URL が確定する
      # ----------------------------------------
      - name: Get API Base URL from CloudFormation
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::warning::ApiUrl not found for stack ${{ steps.stack.outputs.name }} — building frontend without API URL (initial deploy)"
            API_URL=""
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # フロントエンド: Nuxt SPA ビルド
      # ----------------------------------------
      - name: Build frontend
        run: npm run generate
        env:
          # CloudFormation Outputs から取得した API Gateway URL をセット
          # 初回デプロイ時は空文字になる（CDK デプロイ後の再デプロイで確定）
          NUXT_PUBLIC_API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}

      - name: Build Storybook
        run: npm run build-storybook

      # ----------------------------------------
      # CDK Bootstrap（bootstrap スタックを最新バージョンに更新）
      # CDKToolkit スタックが存在し、必要バージョンを満たしている場合はスキップ。
      # CDK が参照する ECR リポジトリが削除されていると bootstrap が
      # 失敗するため、事前に存在確認・作成する
      # ----------------------------------------
      - name: Ensure ECR repository for CDK bootstrap
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="cdk-hnb659fds-container-assets-${ACCOUNT}-ap-northeast-1"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" 2>/dev/null \
            || true

      # ----------------------------------------
      # 孤立リソースのクリーンアップ
      # ロールバック時に残ったロググループを削除（存在しない場合は無視）
      # ----------------------------------------
      - name: Cleanup orphaned log groups
        run: |
          aws logs delete-log-group --log-group-name "/aws/apigateway/classical-music-lake-${STAGE_NAME}" 2>/dev/null || true

      # ----------------------------------------
      # CDK Bootstrap（必要な場合のみ実行）
      # CDKToolkit スタックのバージョンが aws-cdk-lib の要求を満たしていれば
      # bootstrap をスキップして約 1〜3 分を短縮する
      # ----------------------------------------
      - name: CDK Bootstrap (if needed)
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name CDKToolkit \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          CURRENT_VERSION=$(aws cloudformation describe-stacks \
            --stack-name CDKToolkit \
            --query 'Stacks[0].Parameters[?ParameterKey==`BootstrapVersion`].ParameterValue' \
            --output text 2>/dev/null || echo "0")
          REQUIRED_VERSION=$(node -e "try{const p=require('./node_modules/aws-cdk-lib/package.json');console.log(p.config?.bootstrapTemplateVersionThreshold||21)}catch(e){console.log(21)}")

          if [ "$STACK_STATUS" != "CREATE_COMPLETE" ] && [ "$STACK_STATUS" != "UPDATE_COMPLETE" ]; then
            echo "CDKToolkit が存在しないか異常状態 ($STACK_STATUS) のため bootstrap を実行します"
            npx cdk bootstrap
          elif [ "${CURRENT_VERSION:-0}" -lt "$REQUIRED_VERSION" ] 2>/dev/null; then
            echo "Bootstrap バージョン $CURRENT_VERSION < 必要バージョン $REQUIRED_VERSION のため bootstrap を実行します"
            npx cdk bootstrap
          else
            echo "CDK Bootstrap はすでに最新 (v$CURRENT_VERSION >= v$REQUIRED_VERSION) のためスキップします"
          fi
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}

      # ----------------------------------------
      # CDK デプロイ
      # (インフラ更新 + ビルド済みフロントエンドを S3 へ反映)
      # ----------------------------------------
      - name: CDK Deploy
        run: npm run deploy
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}
