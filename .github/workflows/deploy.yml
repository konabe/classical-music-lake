name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "dev*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先の環境"
        required: true
        default: "stg"
        type: choice
        options:
          - dev
          - stg
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            cdk/package-lock.json

      # ----------------------------------------
      # デプロイ先環境の決定
      # push: mainブランチ → stg、dev*タグ → dev
      # release: published → prod
      # workflow_dispatch: 入力値をそのまま使用
      # ----------------------------------------
      - name: Determine stage name
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "STAGE_NAME=prod" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${{ github.ref }}" == refs/tags/dev* ]]; then
              echo "STAGE_NAME=dev" >> "$GITHUB_ENV"
            else
              echo "STAGE_NAME=stg" >> "$GITHUB_ENV"
            fi
          else
            echo "STAGE_NAME=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          fi

      # ----------------------------------------
      # 全依存関係を並列インストール
      # frontend / backend / CDK を同時に実行して待機することで
      # 直列実行と比較して約 1〜2 分短縮
      # ----------------------------------------
      - name: Install all dependencies
        run: |
          npm ci &
          npm ci --prefix backend &
          npm ci --prefix cdk &
          wait

      # ----------------------------------------
      # AWS_ROLE_TO_ASSUME シークレットの存在確認
      # 未設定の場合は後続ステップが不明なエラーで落ちるため事前に検出する
      # ----------------------------------------
      - name: Validate required secrets
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME secret is not set. Please configure GitHub OIDC and set the IAM role ARN as AWS_ROLE_TO_ASSUME in repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      # ----------------------------------------
      # スタック名を決定
      # ----------------------------------------
      - name: Resolve stack name
        id: stack
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            echo "name=ClassicalMusicLakeStack" >> "$GITHUB_OUTPUT"
          else
            echo "name=ClassicalMusicLakeStack-${STAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------
      # デプロイ済みスタックから API Base URL・Cognito 設定を取得
      # スタックが未作成（初回デプロイ）の場合は空文字のまま続行し、
      # CDK デプロイでスタックを作成後、次回デプロイ時に URL が確定する
      # ----------------------------------------
      - name: Get stack outputs from CloudFormation
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::warning::ApiUrl not found for stack ${{ steps.stack.outputs.name }} — building frontend without API URL (initial deploy)"
            API_URL=""
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

          COGNITO_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CognitoDomainName`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$COGNITO_DOMAIN" ] || [ "$COGNITO_DOMAIN" = "None" ]; then
            echo "::warning::CognitoDomainName not found — building frontend without Cognito domain"
            COGNITO_DOMAIN=""
          fi
          echo "cognito_domain=$COGNITO_DOMAIN" >> "$GITHUB_OUTPUT"

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CognitoClientId`].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$COGNITO_CLIENT_ID" ] || [ "$COGNITO_CLIENT_ID" = "None" ]; then
            echo "::warning::CognitoClientId not found — building frontend without Cognito client ID"
            COGNITO_CLIENT_ID=""
          fi
          echo "cognito_client_id=$COGNITO_CLIENT_ID" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # フロントエンド: Nuxt SPA ビルド
      # ----------------------------------------
      - name: Build frontend
        run: npm run generate
        env:
          # CloudFormation Outputs から取得した値をセット
          # 初回デプロイ時は空文字になる（CDK デプロイ後の再デプロイで確定）
          NUXT_PUBLIC_API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}
          NUXT_PUBLIC_COGNITO_DOMAIN: ${{ steps.get-api-url.outputs.cognito_domain }}
          NUXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.get-api-url.outputs.cognito_client_id }}

      - name: Build Storybook
        run: npm run build-storybook

      # ----------------------------------------
      # CDK Bootstrap（bootstrap スタックを最新バージョンに更新）
      # CDKToolkit が参照する ECR リポジトリが削除されていると bootstrap が
      # 失敗するため、事前に存在確認・作成する
      # ----------------------------------------
      - name: Ensure ECR repository for CDK bootstrap
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REPO="cdk-hnb659fds-container-assets-${ACCOUNT}-ap-northeast-1"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" 2>/dev/null \
            || true

      # ----------------------------------------
      # 孤立リソースのクリーンアップ
      # ロールバック時に残ったロググループを削除（存在しない場合は無視）
      # ----------------------------------------
      - name: Cleanup orphaned log groups
        run: |
          aws logs delete-log-group --log-group-name "/aws/apigateway/classical-music-lake-${STAGE_NAME}" 2>/dev/null || true

      - name: CDK Bootstrap
        run: npx cdk bootstrap
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}

      # ----------------------------------------
      # CDK デプロイ
      # (インフラ更新 + ビルド済みフロントエンドを S3 へ反映)
      # dev/stg: --hotswap-fallback で Lambda 変更時は CloudFormation をバイパスして直接更新（高速化）
      # prod: 安全のためフル CloudFormation デプロイ
      # ----------------------------------------
      - name: CDK Deploy
        run: |
          if [ "$STAGE_NAME" = "prod" ]; then
            npm run deploy
          else
            npm run deploy -- --hotswap-fallback
          fi
        working-directory: cdk
        env:
          STAGE_NAME: ${{ env.STAGE_NAME }}
