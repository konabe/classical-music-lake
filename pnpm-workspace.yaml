# pnpm モノレポ設定
# ルート (Nuxt SPA) は暗黙的にワークスペース対象になるため列挙不要。
# 将来 app/ を frontend/ パッケージとして切り出す場合はここに追記する。
packages:
  - backend
  - cdk

# 複数パッケージで重複しがちな依存は catalog で一元管理する。
# 利用側は package.json で "<name>": "catalog:" と記述する。
catalog:
  "@stryker-mutator/core": ^9.6.1
  "@stryker-mutator/vitest-runner": ^9.6.1
  "@types/node": ^25.6.0
  "@vitest/coverage-v8": ^4.1.5
  typescript: ~6.0.3
  vitest: ^4.1.5

# pnpm v9.5+ では overrides / onlyBuiltDependencies / auditConfig は
# package.json の pnpm フィールドではなく pnpm-workspace.yaml に書くのが推奨パス。
overrides:
  serialize-javascript: ^7.0.3
  h3-next: "npm:h3@2.0.1-rc.16"
  undici: ^6.24.0
  fast-xml-parser: 5.5.6
  fast-xml-builder: ^1.1.7
  fast-uri: ^3.1.2
  simple-git: ^3.36.0

onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild
  - unrs-resolver

auditConfig:
  ignoreGhsas:
    - GHSA-v2wj-q39q-566r
    - GHSA-p9ff-h696-f583

# サプライチェーン攻撃対策。https://pnpm.io/supply-chain-security
# 公開直後の改ざん版（chalk/debug、Shai-Hulud 等の事案）を取り込まないための設定。
minimumReleaseAge: 1440 # 公開後 24 時間経過しないバージョンはインストール拒否
trustPolicy: no-downgrade # 署名/プロビナンスのレベルが下がったパッケージを拒否
blockExoticSubdeps: true # トランジティブ依存に git/tarball ソースを許可しない
